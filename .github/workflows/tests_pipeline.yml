name: TestsPipeline
on:
  push:
    branches:
      - 'experiment/**'
      - 'release/**'
      - 'main'
  pull_request:
    branches:
      - main
      - 'release/**'
concurrency:
  group: TestsPipeline-${{ github.ref }}
  cancel-in-progress: true
jobs:

  test:
    strategy:
      matrix:
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
        node: [ '24' ]
    name: ${{ matrix.platform }} - Node ${{ matrix.node }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
        timeout-minutes: 5
      - name: Verify ESLint
        run: npx eslint src/**/*.ts
      - run: echo "✅ All checks passed on ${{ matrix.platform }} with Node ${{ matrix.node }}"
